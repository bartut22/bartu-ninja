name: Deploy to DigitalOcean

on:
  push:
    branches:
      - new  # Trigger deploy on pushes to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest  # GitHub Actions runs on Ubuntu

    steps:
      # Step 1: Check out the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

    # Step 3: Build the React app
    - name: Build React app
      run: |
        npm install
        npm run build  # Assuming you're using npm. Adjust if using yarn

      # Step 4: Upload build to DigitalOcean droplet
      - name: Upload Build to Droplet
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          scp -r ./ .next/standalone $SERVER_USER@$SERVER_IP:/var/www/html/
